<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Screenshots - Kotov Sergei</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #f8f9fa;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        h1 {
            color: #202124;
            text-align: center;
            margin-bottom: 40px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .screenshot {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .screenshot img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Main Page</a>
    
    <h1>🎮 Game Screenshots</h1>
    
    <div class="gallery">
        <div class="screenshot">
            <img src="images/screenshot1.jpg" alt="Screenshot 1">
        </div>
        
        <div class="screenshot">
            <img src="images/screenshot2.jpg" alt="Screenshot 2">
        </div>
        
        <div class="screenshot">
            <img src="images/screenshot3.jpg" alt="Screenshot 3">
        </div>
        
        <div class="screenshot">
            <img src="images/screenshot4.jpg" alt="Screenshot 4">
        </div>
        
        <div class="screenshot">
            <img src="images/screenshot5.jpg" alt="Screenshot 5">
        </div>
    </div>
</body>
</html>
